<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Event Board — World Clock · Pokémon GO Events</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    background: radial-gradient(circle at 20% -10%, #1b2027 0%, #0B0D10 55%);
    color: #ECEDE9;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
  }
  .board { padding: 28px 20px 60px; }
  .header { max-width: 1180px; margin: 0 auto 24px; }
  .eyebrow-top {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #43D9C8;
    margin-bottom: 6px;
  }
  .title { font-size: clamp(24px, 4vw, 34px); font-weight: 700; margin: 0 0 4px; letter-spacing: -0.01em; }
  .subtitle { color: #8B93A1; font-size: 13px; margin: 0; }
  .status-row {
    display: flex; align-items: center; gap: 8px; margin-top: 14px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #8B93A1;
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; }
  .refresh-btn {
    background: none; border: none; color: #8B93A1; cursor: pointer;
    display: inline-flex; align-items: center; gap: 4px;
    font-family: 'IBM Plex Mono', monospace; font-size: 12px;
    padding: 2px 6px; border-radius: 4px;
  }
  .refresh-btn:hover { color: #ECEDE9; background: rgba(255,255,255,0.06); }

  .tab-row { max-width: 1180px; margin: 22px auto 0; display: flex; gap: 6px; }
  .tab-btn {
    background: #14171C; border: 1px solid rgba(255,255,255,0.09); border-bottom: none;
    color: #8B93A1; padding: 10px 18px; border-radius: 10px 10px 0 0;
    font-family: 'Space Grotesk', sans-serif; font-size: 13.5px; font-weight: 600; cursor: pointer;
  }
  .tab-btn.active { color: #ECEDE9; background: #1b2027; border-color: rgba(67,217,200,0.35); }
  .tab-btn:hover:not(.active) { color: #ECEDE9; }
  .tab-count {
    display: inline-block; background: rgba(255,95,168,0.15); color: #FF5FA8; border-radius: 10px;
    padding: 0 6px; font-size: 11px; margin-left: 3px;
  }

  .add-zone { max-width: 1180px; margin: 20px auto 0; position: relative; }
  .add-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .add-input-wrap { position: relative; flex: 1 1 240px; min-width: 200px; }
  .add-input {
    width: 100%; background: #14171C; border: 1px solid rgba(255,255,255,0.09);
    color: #ECEDE9; padding: 9px 12px; border-radius: 8px;
    font-family: 'IBM Plex Mono', monospace; font-size: 13px; outline: none;
  }
  .add-input:focus { border-color: #43D9C8; }
  .suggestions {
    position: absolute; top: calc(100% + 4px); left: 0; right: 0;
    background: #14171C; border: 1px solid rgba(255,255,255,0.09);
    border-radius: 8px; overflow: hidden; z-index: 10; max-height: 260px; overflow-y: auto;
  }
  .suggestion-item {
    padding: 8px 12px; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px;
    cursor: pointer; color: #ECEDE9;
  }
  .suggestion-item:hover { background: rgba(67,217,200,0.12); }

  .chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: #14171C; border: 1px solid rgba(255,255,255,0.09);
    color: #8B93A1; padding: 7px 11px; border-radius: 20px; font-size: 12px;
    cursor: pointer; font-family: 'IBM Plex Mono', monospace;
  }
  .chip:hover { color: #ECEDE9; border-color: #43D9C8; }

  .type-filter-row {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px;
  }
  .type-chip {
    display: inline-flex; align-items: center; gap: 5px;
    background: #14171C; border: 1px solid rgba(255,255,255,0.09);
    color: #ECEDE9; padding: 5px 10px; border-radius: 20px; font-size: 11.5px;
    cursor: pointer; font-family: 'IBM Plex Mono', monospace;
    transition: opacity 0.15s;
  }
  .type-chip .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .type-chip.off { opacity: 0.4; }
  .type-chip:hover { border-color: #43D9C8; }

  .ics-btn {
    background: none; border: none; cursor: pointer; padding: 2px 4px;
    font-size: 12px; line-height: 1; color: #565D6A; flex-shrink: 0;
  }
  .ics-btn:hover { color: #ECEDE9; }

  .custom-panel {
    margin-top: 14px; background: #14171C; border: 1px solid rgba(255,95,168,0.25);
    border-radius: 10px; padding: 14px 16px;
  }
  .custom-panel-head-row {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .custom-panel-head {
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.1em;
    text-transform: uppercase; color: #FF5FA8; margin-bottom: 0;
  }
  .custom-panel-toggle {
    background: none; border: 1px solid rgba(255,95,168,0.3); color: #FF5FA8;
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.05em;
    text-transform: uppercase; padding: 3px 10px; border-radius: 12px; cursor: pointer;
  }
  .custom-panel-toggle:hover { background: rgba(255,95,168,0.1); }
  .custom-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .custom-form-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .custom-form-row .add-input { flex: 1 1 140px; min-width: 110px; }
  .custom-field {
    display: flex; flex-direction: column; gap: 3px; flex: 1 1 110px;
    font-family: 'IBM Plex Mono', monospace; font-size: 9.5px; letter-spacing: 0.05em;
    text-transform: uppercase; color: #8B93A1;
  }
  .custom-field .add-input { width: 100%; }
  .custom-events-list { max-width: 1180px; margin: 18px auto 0; display: flex; flex-direction: column; gap: 10px; }
  .custom-event-card {
    background: #14171C; border: 1px solid rgba(255,255,255,0.07); border-radius: 12px;
    padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .custom-event-card.past { opacity: 0.45; }
  .custom-event-main { min-width: 0; flex: 1 1 200px; }
  .custom-event-name { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
  .custom-event-meta { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: #8B93A1; }
  .custom-status {
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; font-weight: 600; letter-spacing: 0.05em;
    text-transform: uppercase; padding: 3px 9px; border-radius: 12px; white-space: nowrap;
  }
  .custom-status.live { background: rgba(143,209,79,0.15); color: #8FD14F; }
  .custom-status.upcoming { background: rgba(255,176,32,0.15); color: #FFB020; }
  .custom-status.past { background: rgba(139,147,161,0.15); color: #8B93A1; }
  .custom-event-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .custom-events-empty {
    font-family: 'IBM Plex Mono', monospace; color: #565D6A; font-size: 13px;
    max-width: 1180px; margin: 30px auto; text-align: center;
  }

  .grid {
    max-width: 1180px; margin: 26px auto 0; display: grid;
    grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 16px;
  }
  .card { background: #14171C; border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; padding: 18px 18px 16px; }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; }
  .head-right { display: flex; align-items: center; gap: 8px; color: #8B93A1; }
  .icon-btn {
    background: none; border: none; color: #8B93A1; cursor: pointer;
    padding: 2px; border-radius: 4px; display: inline-flex; font-size: 14px; line-height: 1;
  }
  .icon-btn:hover { color: #FF6B4A; background: rgba(255,107,74,0.1); }
  .eyebrow {
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.1em;
    text-transform: uppercase; color: #8B93A1; margin-bottom: 2px;
  }
  .city-name { font-size: 19px; font-weight: 700; margin: 0; }

  .clock {
    margin: 14px 0 4px; display: flex; align-items: baseline; gap: 2px;
    font-family: 'IBM Plex Mono', monospace; font-size: 34px; font-weight: 600; letter-spacing: 0.01em;
  }
  .colon { color: #43D9C8; padding: 0 1px; }
  .flap-wrap { display: inline-block; overflow: hidden; min-width: 1.1ch; }
  .flap-digit { display: inline-block; animation: flip 0.35s ease-out; }
  @keyframes flip {
    0% { transform: translateY(-55%) scaleY(0.4); opacity: 0.3; filter: blur(1px); }
    60% { transform: translateY(4%) scaleY(1.05); opacity: 1; }
    100% { transform: translateY(0) scaleY(1); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) { .flap-digit { animation: none; } }

  .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 14px 0 12px; }
  .section-label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: 0.1em;
    text-transform: uppercase; color: #43D9C8; margin-bottom: 8px;
  }
  .section-label-upcoming { color: #8B93A1; margin-top: 14px; }
  .empty-line { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: #565D6A; margin-bottom: 6px; }
  .event-row { display: flex; gap: 9px; margin-bottom: 9px; }
  .tag { width: 4px; border-radius: 3px; flex-shrink: 0; }
  .event-text { min-width: 0; }
  .event-name { font-size: 13px; font-weight: 600; line-height: 1.25; }
  .event-name a { color: inherit; text-decoration: none; }
  .event-name a:hover { text-decoration: underline; }
  .event-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: #8B93A1; margin-top: 1px; }

  .notice-banner {
    max-width: 1180px; margin: 16px auto 0; display: flex; align-items: center; gap: 8px;
    padding: 10px 14px; border-radius: 8px; font-size: 12.5px; font-family: 'IBM Plex Mono', monospace;
  }
  .notice-banner.warn { background: rgba(255,176,32,0.08); border: 1px solid rgba(255,176,32,0.25); color: #FFD08A; }

  .footer-note {
    max-width: 1180px; margin: 26px auto 0; font-family: 'IBM Plex Mono', monospace;
    font-size: 11px; color: #565D6A;
  }
</style>
</head>
<body>
<div class="board">
  <div class="header">
    <div class="eyebrow-top">World Clock · Pokémon GO Events</div>
    <h1 class="title">Event Board</h1>
    <p class="subtitle">Live local time and active events across the zones you're tracking.</p>
    <div class="status-row">
      <span class="status-dot" id="statusDot"></span>
      <span id="statusText">Loading events…</span>
      <button class="refresh-btn" id="refreshBtn">↻ refresh</button>
    </div>
  </div>

  <div class="tab-row">
    <button class="tab-btn active" id="tabClocksBtn">🕐 Clocks</button>
    <button class="tab-btn" id="tabCustomBtn">📌 Custom Events <span class="tab-count" id="customCount"></span></button>
  </div>

  <div id="clocksTab">
    <div id="noticeBanner"></div>

    <div class="add-zone">
      <div class="add-row">
        <div class="add-input-wrap">
          <input class="add-input" id="addInput" placeholder="Add a timezone or city…" autocomplete="off" />
          <div class="suggestions" id="suggestions" style="display:none;"></div>
        </div>
        <div id="quickAddRow" style="display:contents;"></div>
        <button class="chip" id="copyLinkBtn">🔗 Copy link</button>
      </div>
      <div class="type-filter-row" id="typeFilterRow"></div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

  <div id="customTab" style="display:none;">
    <div class="custom-panel">
      <div class="custom-panel-head-row">
        <div class="custom-panel-head">Add a custom / location event</div>
        <button class="custom-panel-toggle" id="toggleAddForm">Hide</button>
      </div>
      <div class="custom-form" id="ceFormWrapper">
        <div class="custom-form-row">
          <input class="add-input" id="ceName" placeholder="Event name" style="flex:2 1 200px;" />
          <select class="add-input" id="ceZone"></select>
        </div>
        <div class="custom-form-row">
          <label class="custom-field">Start date<input class="add-input" id="ceDate" type="date" /></label>
          <label class="custom-field">Start time<input class="add-input" id="ceStart" type="time" /></label>
          <label class="custom-field">End date<input class="add-input" id="ceEndDate" type="date" /></label>
          <label class="custom-field">End time<input class="add-input" id="ceEnd" type="time" /></label>
        </div>
        <div class="custom-form-row">
          <input class="add-input" id="ceLink" placeholder="Link (optional)" style="flex:1 1 200px;" />
          <button class="chip" id="ceAddBtn">Add event</button>
        </div>
      </div>
    </div>

    <div class="custom-events-list" id="customEventsList"></div>
  </div>

  <div class="footer-note">Event data via ScrapedDuck, sourced from LeekDuck.com.</div>
</div>

<script>
// ---------- Data source ----------
const EVENTS_URL = "https://raw.githubusercontent.com/bigfoott/ScrapedDuck/data/events.min.json";

const DEFAULT_ZONES = [
  { id: "Asia/Tokyo", label: "Tokyo" },
  { id: "America/Sao_Paulo", label: "São Paulo" },
  { id: "Europe/London", label: "London" },
  { id: "Europe/Amsterdam", label: "Amsterdam" },
  { id: "America/New_York", label: "New York" },
];

const QUICK_ADD = [
  { id: "America/Los_Angeles", label: "Los Angeles" },
  { id: "Australia/Sydney", label: "Sydney" },
  { id: "Asia/Kolkata", label: "Mumbai" },
  { id: "Asia/Singapore", label: "Singapore" },
  { id: "Europe/Berlin", label: "Berlin" },
  { id: "Pacific/Auckland", label: "Auckland" },
  { id: "Pacific/Honolulu", label: "Hawaii" },
];

// Snapshot used only if the live fetch fails (e.g. offline). Refreshed 2026-07-13.
const SNAPSHOT_FETCHED_AT = "2026-07-13";
const EMBEDDED_EVENTS = [
  { eventID: "special-anniversary-pikachu-celebration-2026", name: "Special Anniversary Pikachu Celebration", eventType: "event", link: "https://leekduck.com/events/special-anniversary-pikachu-celebration-2026/", start: "2026-07-13T10:00:00.000", end: "2026-07-20T20:00:00.000" },
  { eventID: "mega-lucario-in-mega-raids-july-13-2026", name: "Mega Lucario in Mega Raids", eventType: "raid-battles", link: "https://leekduck.com/events/mega-lucario-in-mega-raids-july-13-2026/", start: "2026-07-13T06:00:00.000", end: "2026-07-14T22:00:00.000" },
  { eventID: "shadow-palkia-july-2026", name: "Shadow Palkia in Raid Battles", eventType: "raid-battles", link: "https://leekduck.com/raid-bosses/", start: "2026-07-01T06:00:00.000", end: "2026-08-04T22:00:00.000" },
  { eventID: "go-pass-july-2026", name: "GO Pass: July", eventType: "event", link: "https://leekduck.com/events/go-pass-july-2026/", start: "2026-07-07T10:00:00.000", end: "2026-08-04T10:00:00.000" },
  { eventID: "raidhour20260715", name: "Kyogre Raid Hour", eventType: "raid-hour", link: "https://leekduck.com/events/raidhour20260715/", start: "2026-07-15T18:00:00.000", end: "2026-07-15T19:00:00.000" },
  { eventID: "pokemonspotlighthour2026-07-16", name: "Zubat Spotlight Hour", eventType: "pokemon-spotlight-hour", link: "https://leekduck.com/events/pokemonspotlighthour2026-07-16/", start: "2026-07-16T18:00:00.000", end: "2026-07-16T19:00:00.000" },
  { eventID: "weekend-event-july-2026", name: "Weekend Event", eventType: "event", link: "https://leekduck.com/events/weekend-event-july-2026/", start: "2026-07-18T10:00:00.000", end: "2026-07-18T20:00:00.000" },
  { eventID: "raid-day-july-2026", name: "Raid Day", eventType: "raid-day", link: "https://leekduck.com/events/", start: "2026-07-18T14:00:00.000", end: "2026-07-18T17:00:00.000" },
  { eventID: "solgaleo-in-5-star-raid-battles-july-2026", name: "Solgaleo in 5-star Raid Battles", eventType: "raid-battles", link: "https://leekduck.com/events/solgaleo-in-5-star-raid-battles-july-2026/", start: "2026-07-22T06:00:00.000", end: "2026-07-28T22:00:00.000" },
  { eventID: "raidhour20260722", name: "Solgaleo Raid Hour", eventType: "raid-hour", link: "https://leekduck.com/events/raidhour20260722/", start: "2026-07-22T18:00:00.000", end: "2026-07-22T19:00:00.000" },
  { eventID: "choose-your-path-fairy-trail-2026", name: "Choose Your Path: Fairy Trail", eventType: "event", link: "https://leekduck.com/events/", start: "2026-07-28T10:00:00.000", end: "2026-08-03T20:00:00.000" },
  { eventID: "pokemonspotlighthour2026-07-30", name: "Bidoof Spotlight Hour", eventType: "pokemon-spotlight-hour", link: "https://leekduck.com/events/pokemonspotlighthour2026-07-30/", start: "2026-07-30T18:00:00.000", end: "2026-07-30T19:00:00.000" },
  { eventID: "august-communityday2026", name: "August Community Day", eventType: "community-day", link: "https://leekduck.com/events/", start: "2026-08-15T14:00:00.000", end: "2026-08-15T17:00:00.000" },
];

const TYPE_COLORS = {
  "community-day": "#FFB020", "raid-day": "#FF6B4A", "raid-hour": "#FF6B4A", "raid-battles": "#FF6B4A",
  "spotlight-hour": "#43D9C8", "pokemon-spotlight-hour": "#43D9C8",
  "research-day": "#8FD14F", "research-breakthrough": "#8FD14F",
  "event": "#9A8CFF", "season": "#9A8CFF", "custom": "#FF5FA8", "default": "#8B93A1",
};
function typeColor(t) { return TYPE_COLORS[(t || "").toLowerCase()] || TYPE_COLORS.default; }

const TYPE_LABELS = {
  "community-day": "Community Day", "raid-day": "Raid Day", "raid-hour": "Raid Hour",
  "raid-battles": "Raid Battles", "pokemon-spotlight-hour": "Spotlight Hour", "spotlight-hour": "Spotlight Hour",
  "research-day": "Research Day", "research-breakthrough": "Research Breakthrough",
  "event": "Event", "season": "Season", "go-battle-league": "GO Battle League",
  "pokemon-go-fest": "GO Fest", "max-mondays": "Max Mondays", "max-battles": "Max Battles", "go-pass": "GO Pass",
  "custom": "Custom / Location",
};
function typeLabel(t) {
  if (TYPE_LABELS[t]) return TYPE_LABELS[t];
  return (t || "unknown").split("-").map((w) => w[0].toUpperCase() + w.slice(1)).join(" ");
}

// ---------- Event type filter ----------
let enabledTypes = new Set(); // types currently shown
let seenTypes = new Set(); // every type we've ever seen, so new ones default to "on"
function syncTypeFilters() {
  const types = [...new Set(events.map((e) => e.eventType))].sort();
  types.forEach((t) => { if (!seenTypes.has(t)) { seenTypes.add(t); enabledTypes.add(t); } });
  renderTypeFilters(types);
}
function renderTypeFilters(types) {
  const row = document.getElementById("typeFilterRow");
  row.innerHTML = types.map((t) => {
    const on = enabledTypes.has(t);
    return `<div class="type-chip${on ? "" : " off"}" data-type="${esc(t)}">
      <span class="dot" style="background:${typeColor(t)}"></span>${esc(typeLabel(t))}
    </div>`;
  }).join("");
  row.querySelectorAll(".type-chip").forEach((el) => {
    el.addEventListener("click", () => {
      const t = el.dataset.type;
      if (enabledTypes.has(t)) enabledTypes.delete(t); else enabledTypes.add(t);
      renderTypeFilters(types);
      renderGrid();
    });
  });
}

// Converts a wall-clock time meant for a SPECIFIC zone (e.g. "2pm in Tokyo")
// into a real UTC instant. Needed for reminders: local-everywhere events
// (Community Day etc.) start at a different absolute moment in each zone.
function getZoneOffsetMs(date, timeZone) {
  const dtf = new Intl.DateTimeFormat("en-US", {
    timeZone, hour12: false, year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit",
  });
  const p = dtf.formatToParts(date);
  const m = {}; p.forEach((x) => (m[x.type] = x.value));
  const hour = m.hour === "24" ? 0 : Number(m.hour);
  const asUTC = Date.UTC(Number(m.year), Number(m.month) - 1, Number(m.day), hour, Number(m.minute), Number(m.second));
  return asUTC - date.getTime();
}
function zonedWallToUTCms(wall, timeZone) {
  const [datePart, timePart] = wall.split("T");
  const [y, mo, d] = datePart.split("-").map(Number);
  const [h, mi, s] = timePart.split(":").map(Number);
  const guess = Date.UTC(y, mo - 1, d, h, mi, s || 0);
  let offset = getZoneOffsetMs(new Date(guess), timeZone);
  let ms = guess - offset;
  offset = getZoneOffsetMs(new Date(ms), timeZone); // second pass for DST edges
  return guess - offset;
}
// The real-world instant an event starts/ends AS EXPERIENCED in a given zone.
function eventAbsoluteMs(target, timeZone) {
  return target.isUTC ? target.ms : zonedWallToUTCms(target.wall, timeZone);
}

function getAllTimeZones() {
  try { if (typeof Intl.supportedValuesOf === "function") return Intl.supportedValuesOf("timeZone"); }
  catch (e) {}
  return DEFAULT_ZONES.concat(QUICK_ADD).map((z) => z.id);
}
function cityLabelFromId(id) {
  const known = DEFAULT_ZONES.concat(QUICK_ADD).find((z) => z.id === id);
  if (known) return known.label;
  const parts = id.split("/");
  return parts[parts.length - 1].replace(/_/g, " ");
}

// ---------- Zone persistence: shareable URL wins, else last-saved list ----------
const ZONES_STORAGE_KEY = "pogo-board-zones";
function saveZones() {
  try { localStorage.setItem(ZONES_STORAGE_KEY, JSON.stringify(zones.map((z) => z.id))); }
  catch (e) { /* ignore */ }
}
function loadInitialZones() {
  try {
    const fromURL = new URLSearchParams(location.search).get("zones");
    if (fromURL) {
      const ids = fromURL.split(",").map((s) => s.trim()).filter(Boolean);
      if (ids.length) {
        // clean the URL so it doesn't stick around as stale state on reload
        history.replaceState(null, "", location.pathname);
        return ids.map((id) => ({ id, label: cityLabelFromId(id) }));
      }
    }
    const saved = JSON.parse(localStorage.getItem(ZONES_STORAGE_KEY) || "null");
    if (Array.isArray(saved) && saved.length) {
      return saved.map((id) => ({ id, label: cityLabelFromId(id) }));
    }
  } catch (e) { /* fall through to defaults */ }
  return DEFAULT_ZONES.slice();
}
function shareableLink() {
  const ids = zones.map((z) => encodeURIComponent(z.id)).join(",");
  return `${location.origin}${location.pathname}?zones=${ids}`;
}

function loadCustomEvents() {

  } catch (e) { return []; }

  catch (e) { /* ignore */ }
}

// Turns saved custom events into the same _start/_end shape the LeekDuck feed
// uses, so they flow through the existing live/upcoming/ICS logic unchanged.
function customEventsToRuntime() {
  return customEvents.map((c) => {
    const endDate = c.endDate || c.date; // backward-compat: older saved entries have no endDate
    const wallStart = `${c.date}T${c.startTime}:00`;
    let wallEnd = `${endDate}T${c.endTime}:00`;
    if (!c.endDate && wallEnd <= wallStart) {
      // backward-compat only: old entries had no end-date field, so a same-day
      // end time earlier than the start time was assumed to mean "next day"
      const d2 = new Date(c.date + "T00:00:00Z");
      d2.setUTCDate(d2.getUTCDate() + 1);
      wallEnd = `${d2.toISOString().slice(0, 10)}T${c.endTime}:00`;
    }
    let startInfo, endInfo;
    if (c.zoneId) {
      // pinned to one specific city: a real, single moment in time
      startInfo = { isUTC: true, ms: zonedWallToUTCms(wallStart, c.zoneId) };
      endInfo = { isUTC: true, ms: zonedWallToUTCms(wallEnd, c.zoneId) };
    } else {
      // "all zones": same local clock hour everywhere, like Community Day
      startInfo = { isUTC: false, wall: wallStart };
      endInfo = { isUTC: false, wall: wallEnd };
    }
    return {
      eventID: c.id, name: c.name, eventType: "custom", link: c.link || "",
      _start: startInfo, _end: endInfo, _customZoneId: c.zoneId || null, isCustom: true,
    };
  });
}

// Two timestamp flavors: "Z"-suffixed = true UTC instant; bare = same local
// wall-clock hour in every timezone (Community Day, Raid Hour, most events).
function parseEventTime(str) {
  if (!str) return null;
  const isUTC = /Z$|[+-]\d{2}:\d{2}$/.test(str);
  if (isUTC) return { isUTC: true, ms: new Date(str).getTime() };
  return { isUTC: false, wall: str.slice(0, 19) };
}
function zoneWallClockString(date, timeZone) {
  const p = new Intl.DateTimeFormat("en-CA", {
    timeZone, year: "numeric", month: "2-digit", day: "2-digit",
    hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false,
  }).formatToParts(date);
  const get = (t) => p.find((x) => x.type === t)?.value ?? "00";
  return `${get("year")}-${get("month")}-${get("day")}T${get("hour")}:${get("minute")}:${get("second")}`;
}
function wallToPseudoMs(wall) { return new Date(wall + ".000Z").getTime(); }
function eventIsLive(e, now, timeZone) {
  if (!e._start || !e._end) return false;
  if (e._start.isUTC) return e._start.ms <= now.getTime() && e._end.ms >= now.getTime();
  const wallNow = zoneWallClockString(now, timeZone);
  return wallNow >= e._start.wall && wallNow <= e._end.wall;
}
function eventIsUpcoming(e, now, timeZone) {
  if (!e._start) return false;
  if (e._start.isUTC) return e._start.ms > now.getTime();
  const wallNow = zoneWallClockString(now, timeZone);
  return wallNow < e._start.wall;
}
function eventCountdownMs(target, now, timeZone) {
  if (target.isUTC) return target.ms - now.getTime();
  const wallNow = zoneWallClockString(now, timeZone);
  return wallToPseudoMs(target.wall) - wallToPseudoMs(wallNow);
}
function eventLocalLabel(target, timeZone) {
  if (target.isUTC) {
    return new Intl.DateTimeFormat("en-US", {
      timeZone, hour: "2-digit", minute: "2-digit", hour12: true, month: "short", day: "2-digit",
    }).format(new Date(target.ms));
  }
  const [datePart, timePart] = target.wall.split("T");
  const [y, mo, d] = datePart.split("-").map(Number);
  const [h, mi] = timePart.split(":").map(Number);
  const dateLabel = new Date(Date.UTC(y, mo - 1, d)).toLocaleDateString("en-US", { timeZone: "UTC", month: "short", day: "2-digit" });
  const period = h >= 12 ? "PM" : "AM";
  const h12 = h % 12 === 0 ? 12 : h % 12;
  return `${dateLabel}, ${h12}:${String(mi).padStart(2, "0")} ${period} local`;
}
function fmtParts(date, timeZone) {
  const dtf = new Intl.DateTimeFormat("en-US", {
    timeZone, hour12: false, hour: "2-digit", minute: "2-digit", second: "2-digit",
    weekday: "short", month: "short", day: "2-digit",
  });
  const parts = dtf.formatToParts(date);
  const get = (t) => parts.find((p) => p.type === t)?.value ?? "";
  return { h: get("hour"), m: get("minute"), s: get("second"), weekday: get("weekday"), month: get("month"), day: get("day") };
}
function isDaytime(date, timeZone) {
  const hour = parseInt(new Intl.DateTimeFormat("en-US", { timeZone, hour12: false, hour: "2-digit" }).format(date), 10);
  return hour >= 6 && hour < 19;
}
function countdown(ms) {
  if (ms < 0) ms = 0;
  const totalMin = Math.floor(ms / 60000);
  const d = Math.floor(totalMin / 1440), h = Math.floor((totalMin % 1440) / 60), m = totalMin % 60;
  if (d > 0) return `${d}d ${h}h`;
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// ---------- Add to Calendar (.ics) ----------
function icsEscape(text) {
  return String(text).replace(/\\/g, "\\\\").replace(/;/g, "\\;").replace(/,/g, "\\,").replace(/\n/g, "\\n");
}
function toICSDate(ms) {
  return new Date(ms).toISOString().replace(/[-:]/g, "").split(".")[0] + "Z";
}
function downloadICS(event, zone) {
  const startMs = eventAbsoluteMs(event._start, zone.id);
  const endMs = eventAbsoluteMs(event._end, zone.id);
  const nowStamp = toICSDate(Date.now());
  const uid = `${event.eventID}-${zone.id}@pogo-event-board`;
  const summary = icsEscape(`${event.name} (${zone.label})`);
  const description = event.link ? icsEscape(event.link) : "";

  const lines = [
    "BEGIN:VCALENDAR",
    "VERSION:2.0",
    "PRODID:-//Event Board//Pokemon GO Events//EN",
    "BEGIN:VEVENT",
    `UID:${uid}`,
    `DTSTAMP:${nowStamp}`,
    `DTSTART:${toICSDate(startMs)}`,
    `DTEND:${toICSDate(endMs)}`,
    `SUMMARY:${summary}`,
  ];
  if (description) lines.push(`DESCRIPTION:${description}`);
  if (event.link) lines.push(`URL:${event.link}`);
  lines.push("END:VEVENT", "END:VCALENDAR");

  const blob = new Blob([lines.join("\r\n")], { type: "text/calendar;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `${event.eventID}.ics`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 2000);
}

function mapEventTimes(data) {
  return data.filter((e) => e.start && e.end)
    .map((e) => ({ ...e, _start: parseEventTime(e.start), _end: parseEventTime(e.end) }));
}

async function loadEvents() {
  status = "loading";
  renderStatus();
  try {
    const res = await fetch(EVENTS_URL, { cache: "no-store" });
    if (!res.ok) throw new Error("bad response");
    const data = await res.json();
    events = mapEventTimes(data);
    status = "live";
  } catch (err) {
    events = mapEventTimes(EMBEDDED_EVENTS);
    status = "snapshot";
  }
  renderStatus();
  syncTypeFilters();
  renderGrid();
}

function renderStatus() {
  const dot = document.getElementById("statusDot");
  const text = document.getElementById("statusText");
  const banner = document.getElementById("noticeBanner");
  const colors = { live: "#8FD14F", snapshot: "#FFB020", loading: "#8B93A1" };
  dot.style.background = colors[status];
  dot.style.boxShadow = `0 0 8px ${colors[status]}`;
  if (status === "loading") text.textContent = "Loading events…";
  else if (status === "live") text.textContent = `${events.length} events loaded (live)`;
  else text.textContent = `${events.length} events (snapshot from ${SNAPSHOT_FETCHED_AT})`;

  if (status === "snapshot") {
    banner.innerHTML = `<div class="notice-banner warn">⚠ Live fetch failed (offline, or the feed is unreachable) — showing a fixed snapshot from ${SNAPSHOT_FETCHED_AT}.</div>`;
  } else {

  }
}

function cityCardHTML(zone, now) {
  const p = fmtParts(now, zone.id);
  const day = isDaytime(now, zone.id);
  const visibleEvents = events.filter((e) => enabledTypes.has(e.eventType));
  const live = visibleEvents.filter((e) => eventIsLive(e, now, zone.id));
  const upcoming = visibleEvents.filter((e) => eventIsUpcoming(e, now, zone.id))
    .sort((a, b) => eventCountdownMs(a._start, now, zone.id) - eventCountdownMs(b._start, now, zone.id))
    .slice(0, 3);

  const icsBtn = (e) =>
    `<button class="ics-btn" data-eventid="${esc(e.eventID)}" data-zoneid="${esc(zone.id)}" title="Add to calendar">📅</button>`;

  const liveHTML = live.length === 0
    ? `<div class="empty-line">Nothing active</div>`
    : live.map((e) => `
      <div class="event-row">
        <span class="tag" style="background:${typeColor(e.eventType)}"></span>
        <div class="event-text">
          <div class="event-name"><a href="${esc(e.link || '#')}" target="_blank" rel="noopener">${esc(e.name)}</a></div>
          <div class="event-sub">ends ${eventLocalLabel(e._end, zone.id)} · ${countdown(eventCountdownMs(e._end, now, zone.id))} left</div>
        </div>
        ${icsBtn(e)}
      </div>`).join("");

  const upcomingHTML = upcoming.length === 0 ? "" : `
    <div class="section-label section-label-upcoming">Next up</div>
    ${upcoming.map((e) => `
      <div class="event-row">
        <span class="tag" style="background:${typeColor(e.eventType)}"></span>
        <div class="event-text">
          <div class="event-name"><a href="${esc(e.link || '#')}" target="_blank" rel="noopener">${esc(e.name)}</a></div>
          <div class="event-sub">starts ${eventLocalLabel(e._start, zone.id)} · in ${countdown(eventCountdownMs(e._start, now, zone.id))}</div>
        </div>
        ${icsBtn(e)}
      </div>`).join("")}
  `;

  return `
    <div class="card" data-zoneid="${esc(zone.id)}">
      <div class="card-head">
        <div>
          <div class="eyebrow">${p.weekday} · ${p.month} ${p.day}</div>
          <h2 class="city-name">${esc(zone.label)}</h2>
        </div>
        <div class="head-right">
          <span>${day ? "☀" : "☾"}</span>
          <button class="icon-btn remove-zone-btn" data-zoneid="${esc(zone.id)}" aria-label="Remove ${esc(zone.label)}">✕</button>
        </div>
      </div>
      <div class="clock">
        <span class="flap-wrap"><span class="flap-digit" data-part="h">${p.h}</span></span><span class="colon">:</span>
        <span class="flap-wrap"><span class="flap-digit" data-part="m">${p.m}</span></span><span class="colon">:</span>
        <span class="flap-wrap"><span class="flap-digit" data-part="s">${p.s}</span></span>
      </div>
      <div class="divider"></div>
      <div class="events-block">
        <div class="section-label">Live now</div>
        ${liveHTML}
        ${upcomingHTML}
      </div>
    </div>
  `;
}

function renderGrid() {

  const now = new Date();
  grid.innerHTML = zones.map((z) => cityCardHTML(z, now)).join("");
  grid.querySelectorAll(".remove-zone-btn").forEach((btn) => {

  grid.querySelectorAll(".ics-btn").forEach((btn) => {

      const zoneId = btn.dataset.zoneid;
      const zone = zones.find((z) => z.id === zoneId);
      const event = events.find((e) => e.eventID === eventID);
      if (!zone || !event) return;
      downloadICS(event, zone);
    });
  });
}

// Cheap per-second tick: just rewrite the clock digits without rebuilding
// event lists (those only need to refresh once a minute).
function tickClocks() {
  const now = new Date();
  document.querySelectorAll(".card").forEach((card) => {
    const zoneId = card.dataset.zoneid;
    const p = fmtParts(now, zoneId);
    const hEl = card.querySelector('[data-part="h"]');
    const mEl = card.querySelector('[data-part="m"]');
    const sEl = card.querySelector('[data-part="s"]');
    if (sEl && sEl.textContent !== p.s) {
      sEl.textContent = p.s;
      sEl.style.animation = "none"; void sEl.offsetWidth; sEl.style.animation = "";
    }
    if (mEl && mEl.textContent !== p.m) {
      mEl.textContent = p.m;
      mEl.style.animation = "none"; void mEl.offsetWidth; mEl.style.animation = "";
    }
    if (hEl && hEl.textContent !== p.h) {
      hEl.textContent = p.h;
      hEl.style.animation = "none"; void hEl.offsetWidth; hEl.style.animation = "";
    }
  });
}

function customEventStatus(runtimeEvent, referenceZone, now) {
  if (eventIsLive(runtimeEvent, now, referenceZone)) return "live";
  if (eventIsUpcoming(runtimeEvent, now, referenceZone)) return "upcoming";
  return "past";
}

function renderCustomEventsList() {
  const container = document.getElementById("customEventsList");
  const countEl = document.getElementById("customCount");
  countEl.textContent = customEvents.length ? customEvents.length : "";

  if (customEvents.length === 0) {
    container.innerHTML = `<div class="custom-events-empty">No custom events yet — add one above.</div>`;
    return;
  }

  const now = new Date();
  const browserZone = Intl.DateTimeFormat().resolvedOptions().timeZone;
  const runtime = customEventsToRuntime();

  const withStatus = customEvents.map((c, i) => {
    const r = runtime[i];
    const refZone = c.zoneId || browserZone;
    return { c, r, refZone, status: customEventStatus(r, refZone, now) };
  });

  const order = { live: 0, upcoming: 1, past: 2 };
  withStatus.sort((a, b) => {
    if (order[a.status] !== order[b.status]) return order[a.status] - order[b.status];
    return eventCountdownMs(a.r._start, now, a.refZone) - eventCountdownMs(b.r._start, now, b.refZone);
  });

  container.innerHTML = withStatus.map(({ c, r, refZone, status }) => {
    const zoneLabel = c.zoneId ? cityLabelFromId(c.zoneId) : `Local time (${browserZone.split("/").pop().replace(/_/g, " ")})`;
    let statusText, subText;
    if (status === "live") {
      statusText = "Live now";
      subText = `ends ${eventLocalLabel(r._end, refZone)} · ${countdown(eventCountdownMs(r._end, now, refZone))} left`;
    } else if (status === "upcoming") {
      statusText = "Upcoming";
      subText = `starts ${eventLocalLabel(r._start, refZone)} · in ${countdown(eventCountdownMs(r._start, now, refZone))}`;
    } else {
      statusText = "Ended";
      subText = `ended ${eventLocalLabel(r._end, refZone)}`;
    }
    return `
      <div class="custom-event-card${status === "past" ? " past" : ""}">
        <div class="custom-event-main">
          <div class="custom-event-name">${esc(c.name)}</div>
          <div class="custom-event-meta">${esc(zoneLabel)} · ${subText}</div>
        </div>
        <span class="custom-status ${status}">${statusText}</span>
        <div class="custom-event-actions">
          <button class="ics-btn custom-ics-btn" data-id="${esc(c.id)}" title="Add to calendar">📅</button>
          <button class="icon-btn remove-custom-btn" data-id="${esc(c.id)}" aria-label="Remove ${esc(c.name)}">✕</button>
        </div>
      </div>`;
  }).join("");

  container.querySelectorAll(".remove-custom-btn").forEach((btn) => {
    btn.addEventListener("click", () => removeCustomEvent(btn.dataset.id));
  });
  container.querySelectorAll(".custom-ics-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const c = customEvents.find((x) => x.id === btn.dataset.id);
      if (!c) return;
      const r = customEventsToRuntime().find((x) => x.eventID === c.id);
      const zoneId = c.zoneId || Intl.DateTimeFormat().resolvedOptions().timeZone;
      downloadICS(r, { id: zoneId, label: c.zoneId ? cityLabelFromId(c.zoneId) : "Local" });
    });
  });
}

  applyAddFormCollapsedState();
});
applyAddFormCollapsedState();

// default the date fields to today once, up front
(() => {
  const dateEl = document.getElementById("ceDate");
  const endDateEl = document.getElementById("ceEndDate");
  const today = new Date().toISOString().slice(0, 10);
  dateEl.value = today;
  endDateEl.value = today;
  endDateEl.min = today;
})();

document.getElementById("ceAddBtn").addEventListener("click", () => {
  const name = document.getElementById("ceName").value.trim();
  const zoneId = document.getElementById("ceZone").value;
  const date = document.getElementById("ceDate").value;
  const endDate = document.getElementById("ceEndDate").value || date;
  const startTime = document.getElementById("ceStart").value;
  const endTime = document.getElementById("ceEnd").value;
  const link = document.getElementById("ceLink").value.trim();
  if (!name || !date || !startTime || !endTime) {
    alert("Please fill in the event name, date, start time, and end time.");
    return;
  }
  if (endDate < date || (endDate === date && endTime <= startTime)) {
    alert("The end date/time needs to be after the start date/time.");
    return;
  }
  addCustomEvent({ name, zoneId, date, endDate, startTime, endTime, link });
  document.getElementById("ceName").value = "";
  document.getElementById("ceLink").value = "";
});

renderQuickAdd();
renderCustomZoneOptions();
renderCustomEventsList();
loadEvents();
setInterval(tickClocks, 1000);
setInterval(renderGrid, 60 * 1000); // refresh event lists every minute
setInterval(renderCustomEventsList, 60 * 1000); // keep custom-event statuses fresh
setInterval(loadEvents, 15 * 60 * 1000); // re-fetch event data every 15 min
</script>
</body>
</html>
